<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNL 메트릭 트리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f4f0;
  --color-background-tertiary:#efede8;
  --color-text-primary:#1a1a18;
  --color-text-secondary:#6b6a64;
  --color-text-tertiary:#9c9a92;
  --color-text-danger:#a32d2d;
  --color-text-info:#185FA5;
  --color-border-tertiary:rgba(0,0,0,0.1);
  --color-border-secondary:rgba(0,0,0,0.18);
  --color-border-primary:rgba(0,0,0,0.28);
  --color-border-info:#85B7EB;
  --color-border-danger:#F09595;
  --color-background-info:#E6F1FB;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}
@media (prefers-color-scheme: dark){
  :root{
    --color-background-primary:#1e1e1c;
    --color-background-secondary:#2a2a27;
    --color-background-tertiary:#242422;
    --color-text-primary:#e8e6de;
    --color-text-secondary:#9c9a92;
    --color-text-tertiary:#6b6a64;
    --color-border-tertiary:rgba(255,255,255,0.1);
    --color-border-secondary:rgba(255,255,255,0.18);
    --color-border-primary:rgba(255,255,255,0.28);
    --color-background-info:#0c2a45;
    --color-text-info:#85B7EB;
    --color-border-info:#185FA5;
  }
}
body{font-family:var(--font-sans);font-size:13px;background:var(--color-background-tertiary);color:var(--color-text-primary);padding:20px;min-height:100vh}
h1{font-size:16px;font-weight:500;margin-bottom:4px;color:var(--color-text-primary)}
.page-desc{font-size:12px;color:var(--color-text-secondary);margin-bottom:14px}

#canvas-wrap{width:100%;height:calc(100vh - 140px);overflow:hidden;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);position:relative;cursor:grab}
#canvas-wrap.panning{cursor:grabbing}
#canvas-wrap.space-held{cursor:grab}
#board-scaler{transform-origin:0 0;will-change:transform;position:absolute;top:0;left:0}
#board{position:relative}
.zoom-info{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:50;display:flex;align-items:center;gap:6px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--color-text-secondary);user-select:none;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.zoom-info button{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px;padding:0 3px;line-height:1}
.zoom-info button:hover{color:var(--color-text-primary)}
svg#lines{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}

.tbl-card{position:absolute;background:var(--color-background-primary);border-radius:10px;border:1px solid var(--color-border-secondary);width:240px;overflow:hidden;user-select:none}
.tbl-card.l2{border-top:3px solid #1D9E75}
.tbl-card.l3{border-top:3px solid #378ADD}
.tbl-card.l4{border-top:3px solid #EF9F27}
.tbl-head{padding:8px 10px 6px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:move}
.tbl-head:hover{background:var(--color-background-secondary)}
.tbl-name{font-size:11px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono);word-break:break-all;line-height:1.4}
.tbl-desc{font-size:10px;color:var(--color-text-secondary);margin-top:2px;line-height:1.3}
.tbl-head-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.tbl-badge{display:inline-block;font-size:9px;font-weight:500;padding:1px 5px;border-radius:3px;margin-bottom:3px}
.tbl-toggle{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:14px;padding:0 2px;line-height:1;flex-shrink:0;transition:transform 0.2s}
.tbl-toggle:hover{color:var(--color-text-secondary)}
.tbl-toggle.collapsed{transform:rotate(-90deg)}
.col-rows.collapsed{display:none}
.col-count{font-size:9px;color:var(--color-text-tertiary);padding:4px 10px;display:none}
.col-rows.collapsed+.col-count{display:block}
.b-l2{background:#E1F5EE;color:#085041}
.b-l3{background:#E6F1FB;color:#0C447C}
.b-l4{background:#FAEEDA;color:#633806}

.col-rows{padding:4px 0}
.col-row{display:flex;align-items:center;padding:3px 10px;gap:5px;min-height:26px;cursor:pointer;position:relative;flex-wrap:wrap}
.col-row:hover{background:var(--color-background-secondary)}
.col-row.has-formula{background:rgba(55,138,221,0.06)}
.col-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-raw{background:var(--color-border-secondary)}
.dot-calc{background:#378ADD}
.col-top{display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.col-name{font-size:11px;font-family:var(--font-mono);color:var(--color-text-primary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.col-type{font-size:9px;color:var(--color-text-tertiary);flex-shrink:0}
.formula-icon{font-size:9px;background:#E6F1FB;color:#185FA5;padding:0 3px;border-radius:2px;flex-shrink:0}
.col-formula{width:100%;font-size:10px;font-family:var(--font-mono);color:var(--color-text-info);padding:2px 0 1px 11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.85;display:none}
.col-formula:hover{opacity:1}
.show-formulas .col-formula{display:block}
.col-formula-edit{width:calc(100% - 11px);font-size:10px;font-family:var(--font-mono);color:var(--color-text-info);padding:3px 6px;margin:2px 0 1px 11px;border:1px solid var(--color-border-info);border-radius:4px;background:var(--color-background-primary);outline:none}
.col-formula-edit:focus{box-shadow:0 0 0 2px rgba(55,138,221,0.2)}

.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.toolbar button{font-size:12px;padding:5px 12px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);border-radius:var(--border-radius-md);cursor:pointer;display:flex;align-items:center;gap:5px}
.toolbar button:hover{background:var(--color-background-secondary)}
.toolbar .sep{width:1px;height:18px;background:var(--color-border-tertiary)}
.legend{display:flex;align-items:center;gap:12px;margin-left:auto;font-size:11px;color:var(--color-text-secondary)}
.leg-item{display:flex;align-items:center;gap:5px}

/* Edit panel */
.edit-panel{position:fixed;z-index:300;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:10px;padding:14px;width:250px;box-shadow:0 4px 16px rgba(0,0,0,0.12);max-height:80vh;overflow-y:auto}
.ep-title{font-size:12px;font-weight:500;margin-bottom:10px;color:var(--color-text-primary)}
.ep-field{margin-bottom:8px}
.ep-field label{display:block;font-size:10px;color:var(--color-text-secondary);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.ep-field input,.ep-field textarea,.ep-field select{width:100%;font-family:var(--font-sans);font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:5px 8px;color:var(--color-text-primary);background:var(--color-background-primary);outline:none}
.ep-field input:focus,.ep-field textarea:focus,.ep-field select:focus{border-color:var(--color-border-info)}
.ep-field textarea{resize:vertical;min-height:52px}
.ep-btns{display:flex;gap:5px;margin-top:10px}
.ep-btns button{font-size:11px;padding:5px 11px;border-radius:6px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary)}
.ep-btns button:hover{background:var(--color-background-secondary)}
.ep-save{background:var(--color-background-info)!important;color:var(--color-text-info)!important;border-color:var(--color-border-info)!important}
.ep-del{color:var(--color-text-danger)!important;border-color:var(--color-border-danger)!important;margin-right:auto}

.add-col-btn{display:block;width:calc(100% - 20px);margin:2px 10px 6px;font-size:10px;padding:3px 6px;border:0.5px dashed var(--color-border-secondary);background:transparent;color:var(--color-text-tertiary);border-radius:4px;cursor:pointer;text-align:left}
.add-col-btn:hover{color:var(--color-text-secondary);border-color:var(--color-border-primary)}

.ref-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;background:var(--color-background-info);color:var(--color-text-info);padding:1px 5px;border-radius:3px;font-family:var(--font-mono);margin:1px 0}
.ref-tag button{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:11px;padding:0 1px;line-height:1}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);padding:20px;width:360px;max-width:90vw}
.modal-card h3{font-size:14px;font-weight:500;margin-bottom:14px}
.modal-field{margin-bottom:10px}
.modal-field label{display:block;font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:3px}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;font-family:var(--font-sans);font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 10px;color:var(--color-text-primary);background:var(--color-background-primary);outline:none}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--color-border-info)}
.modal-field textarea{resize:vertical;min-height:60px}
.modal-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.modal-btns button{font-size:12px;padding:6px 14px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary)}
.modal-btns button:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--color-background-info)!important;color:var(--color-text-info)!important;border-color:var(--color-border-info)!important;font-weight:500}
.btn-danger{color:var(--color-text-danger)!important;border-color:var(--color-border-danger)!important;margin-right:auto}
</style>
</head>
<body>

<h1>PNL 메트릭 트리</h1>
<p class="page-desc">테이블 헤더를 드래그하여 이동 · 컬럼/헤더 더블클릭하여 편집</p>

<div class="toolbar">
  <button onclick="openAddTableModal()"><i class="ti ti-plus"></i>테이블 추가</button>
  <div class="sep"></div>
  <button onclick="toggleLines()"><i class="ti ti-arrows-split-2"></i><span id="lines-label">참조선 숨기기</span></button>
  <button onclick="toggleFormulas()"><i class="ti ti-math-function"></i><span id="formulas-label">연산식 보기</span></button>
  <button onclick="resetLayout()"><i class="ti ti-layout-distribute-horizontal"></i>레이아웃 초기화</button>
  <div class="sep"></div>
  <button onclick="exportJSON()"><i class="ti ti-download"></i>JSON 저장</button>
  <button onclick="document.getElementById('import-file').click()"><i class="ti ti-upload"></i>JSON 불러오기</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
  <div class="legend">
    <div class="leg-item"><span style="width:8px;height:8px;border-radius:50%;background:#378ADD;display:inline-block"></span>연산 컬럼</div>
    <div class="leg-item"><span style="width:8px;height:8px;border-radius:50%;background:var(--color-border-secondary);display:inline-block"></span>raw 컬럼</div>
    <div class="leg-item"><span style="width:22px;height:2px;background:#378ADD;display:inline-block;opacity:.5;border-top:2px dashed #378ADD"></span>참조</div>
    <div class="leg-item"><span style="width:22px;height:1px;background:var(--color-border-secondary);display:inline-block"></span>계층</div>
  </div>
</div>

<div id="canvas-wrap">
  <div class="zoom-info">
    <button onclick="zoomTo(zoomLevel*0.85)">−</button>
    <span id="zoom-label">100%</span>
    <button onclick="zoomTo(zoomLevel*1.15)">+</button>
    <button onclick="fitToView()" style="font-size:10px;margin-left:2px">맞추기</button>
  </div>
  <div id="board-scaler">
    <div id="board">
      <svg id="lines" width="100%" height="100%"></svg>
    </div>
  </div>
</div>

<div id="edit-panel" class="edit-panel" style="display:none"></div>
<div id="modal-overlay" style="display:none"></div>

<script>
let showLines = true;
let showFormulas = false;
let idC = 300;
let positions = {};
let collapsedTables = {};
window._epRefs = [];

/* ── Figma-style pan & zoom ── */
const canvasWrap = document.getElementById('canvas-wrap');
const boardScaler = document.getElementById('board-scaler');
let panX = 0, panY = 0, zoomLevel = 1;
let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;
let spaceHeld = false;
let cardDragging = false;

function applyTransform(){
  boardScaler.style.transform = `translate(${panX}px,${panY}px) scale(${zoomLevel})`;
  document.getElementById('zoom-label').textContent = Math.round(zoomLevel*100)+'%';
}

function zoomTo(newLevel, cx, cy){
  newLevel = Math.min(3, Math.max(0.15, Math.round(newLevel*100)/100));
  if(cx===undefined){ cx=canvasWrap.clientWidth/2; cy=canvasWrap.clientHeight/2; }
  const wx=(cx-panX)/zoomLevel, wy=(cy-panY)/zoomLevel;
  panX=cx-wx*newLevel; panY=cy-wy*newLevel;
  zoomLevel=newLevel;
  applyTransform();
}

function fitToView(){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  tables.forEach(t=>{const p=positions[t.id];if(!p)return;minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x+CARD_W);maxY=Math.max(maxY,p.y+cardH(t));});
  if(minX===Infinity)return;
  const cw=canvasWrap.clientWidth, ch=canvasWrap.clientHeight, pad=40;
  const contentW=maxX-minX+pad*2, contentH=maxY-minY+pad*2;
  zoomLevel=Math.min(1, Math.min(cw/contentW, ch/contentH));
  panX=(cw-contentW*zoomLevel)/2 - (minX-pad)*zoomLevel;
  panY=(ch-contentH*zoomLevel)/2 - (minY-pad)*zoomLevel;
  applyTransform();
}

/* Wheel: pinch=zoom, plain scroll=pan */
canvasWrap.addEventListener('wheel', function(e){
  e.preventDefault();
  if(e.ctrlKey){
    const rect=canvasWrap.getBoundingClientRect();
    const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
    const factor=e.deltaY>0?0.95:1.05;
    zoomTo(zoomLevel*factor, cx, cy);
  } else {
    panX-=e.deltaX; panY-=e.deltaY;
    applyTransform();
  }
}, {passive:false});

/* Space+drag or middle-click pan */
document.addEventListener('keydown',function(e){
  if(e.code==='Space'&&!e.repeat&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){
    spaceHeld=true; canvasWrap.classList.add('space-held'); e.preventDefault();
  }
});
document.addEventListener('keyup',function(e){
  if(e.code==='Space'){spaceHeld=false; canvasWrap.classList.remove('space-held');}
});

canvasWrap.addEventListener('mousedown',function(e){
  if(cardDragging)return;
  if(spaceHeld||e.button===1||(e.button===0&&!e.target.closest('.tbl-card')&&!e.target.closest('.zoom-info'))){
    isPanning=true; panStartX=e.clientX; panStartY=e.clientY; panOriginX=panX; panOriginY=panY;
    canvasWrap.classList.add('panning'); e.preventDefault();
  }
});
document.addEventListener('mousemove',function(e){
  if(!isPanning)return;
  panX=panOriginX+(e.clientX-panStartX); panY=panOriginY+(e.clientY-panStartY);
  applyTransform();
});
document.addEventListener('mouseup',function(e){
  if(isPanning){isPanning=false; canvasWrap.classList.remove('panning');}
});

let tables = [
  {id:'t1',level:2,name:'2_global_pnl',desc:'해외 모든 매체 통합 PNL',parent:null,children:['t2','t3'],
   cols:[
    {id:'c1',name:'settlement_date',type:'TS',formula:'amz.transaction_release_date | tt.statement_date',refs:[{tableId:'t2',colId:'c102'},{tableId:'t3',colId:'c232'}]},
    {id:'c2',name:'order_date',type:'TS',formula:'amz.date_time | tt.order_date',refs:[{tableId:'t2',colId:'c101'},{tableId:'t3',colId:'c201'}]},
    {id:'c3',name:'settlement_id',type:'VAR',formula:'amz.settlement_id | tt.statement_id',refs:[{tableId:'t2',colId:'c103'},{tableId:'t3',colId:'c202'}]},
    {id:'c4',name:'order_id',type:'VAR',formula:'amz.order_id | tt.order_or_adjustment_id',refs:[{tableId:'t2',colId:'c104'},{tableId:'t3',colId:'c203'}]},
    {id:'c5',name:'type',type:'VAR',formula:'amz.type | tt.type',refs:[{tableId:'t2',colId:'c105'},{tableId:'t3',colId:'c204'}]},
    {id:'c6',name:'product_name',type:'VAR',formula:'amz.description | tt.product_name',refs:[{tableId:'t2',colId:'c106'},{tableId:'t3',colId:'c205'}]},
    {id:'c7',name:'sku_name',type:'VAR',formula:'amz.sku | tt.sku_name',refs:[{tableId:'t2',colId:'c107'},{tableId:'t3',colId:'c206'}]},
    {id:'c8',name:'sku_id',type:'VAR',formula:'tt.sku_id',refs:[{tableId:'t3',colId:'c207'}]},
    {id:'c9',name:'quantity',type:'INT',formula:'amz.quantity | tt.quantity',refs:[{tableId:'t2',colId:'c108'},{tableId:'t3',colId:'c208'}]},
    {id:'c10',name:'currency',type:'VAR',formula:'"USD"',refs:[]},
    {id:'c11',name:'revenue',type:'DEC',formula:'amz.revenue | tt.revenue',refs:[{tableId:'t2',colId:'c109'},{tableId:'t3',colId:'c210'}]},
    {id:'c12',name:'shipping',type:'DEC',formula:'amz.shipping | tt.shipping + tt.retail_delivery_fee',refs:[{tableId:'t2',colId:'c110'},{tableId:'t3',colId:'c211'},{tableId:'t3',colId:'c229'}]},
    {id:'c13',name:'fullfilment_type',type:'VAR',formula:'"FBA" | "FBT"',refs:[]},
    {id:'c14',name:'fullfilment_fee',type:'DEC',formula:'amz.FBA | tt.FBT',refs:[{tableId:'t2',colId:'c111'},{tableId:'t3',colId:'c212'}]},
    {id:'c15',name:'commission_fees',type:'DEC',formula:'amz.fees | tt.fees + tt.affiliate',refs:[{tableId:'t2',colId:'c112'},{tableId:'t3',colId:'c213'},{tableId:'t3',colId:'c230'}]},
    {id:'c16',name:'promotion',type:'DEC',formula:'amz.promotion | tt.promotion + tt.o_card_discount',refs:[{tableId:'t2',colId:'c113'},{tableId:'t3',colId:'c214'},{tableId:'t3',colId:'c231'}]},
    {id:'c17',name:'tax_collected',type:'DEC',formula:'amz.tax_collected | tt.o_tax_collected',refs:[{tableId:'t2',colId:'c114'},{tableId:'t3',colId:'c215'}]},
    {id:'c18',name:'tax_withheld',type:'DEC',formula:'amz.tax_withheld | tt.tax_withheld',refs:[{tableId:'t2',colId:'c115'},{tableId:'t3',colId:'c216'}]},
    {id:'c19',name:'other',type:'DEC',formula:'amz.other | tt.other',refs:[{tableId:'t2',colId:'c116'},{tableId:'t3',colId:'c217'}]},
    {id:'c20',name:'net_settlement',type:'DEC',formula:'amz.net_settlement | tt.net_settlement',refs:[{tableId:'t2',colId:'c117'},{tableId:'t3',colId:'c218'}]},
    {id:'c21',name:'c_sku',type:'VAR',formula:'amz.c_sku | tt.c_sku',refs:[{tableId:'t2',colId:'c118'},{tableId:'t3',colId:'c219'}]},
    {id:'c22',name:'c_cogs_value',type:'DEC',formula:'amz.c_cogs_value | tt.c_cogs_value',refs:[{tableId:'t2',colId:'c119'},{tableId:'t3',colId:'c220'}]},
    {id:'c23',name:'c_cogs_value_total',type:'DEC',formula:'amz.c_cogs_total_value | tt.c_cogs_value_total',refs:[{tableId:'t2',colId:'c120'},{tableId:'t3',colId:'c221'}]},
    {id:'c24',name:'state',type:'VAR',formula:'amz.order_state | tt.o_state',refs:[{tableId:'t2',colId:'c121'},{tableId:'t3',colId:'c222'}]},
    {id:'c25',name:'postal',type:'VAR',formula:'amz.order_postal',refs:[{tableId:'t2',colId:'c122'}]},
    {id:'c26',name:'city',type:'VAR',formula:'amz.order_city',refs:[{tableId:'t2',colId:'c123'}]},
    {id:'c27',name:'recipient',type:'VAR',formula:'tt.o_recipient',refs:[{tableId:'t3',colId:'c223'}]},
    {id:'c28',name:'phone',type:'VAR',formula:'tt.o_phone',refs:[{tableId:'t3',colId:'c224'}]},
    {id:'c29',name:'country',type:'VAR',formula:'tt.o_country',refs:[{tableId:'t3',colId:'c225'}]},

const CARD_W=240, HEAD_H=64, GAP_X=64, GAP_Y=24;
function COL_H(col){ return (showFormulas && col && col.formula && col.formula.trim()) ? 42 : 26; }

function getTable(id){return tables.find(t=>t.id===id)}
function getCol(tid,cid){const t=getTable(tid);return t?t.cols.find(c=>c.id===cid):null}
function cardH(t){
  if(collapsedTables[t.id]) return HEAD_H+24;
  return HEAD_H+t.cols.reduce((s,c)=>s+COL_H(c),0)+32;
}

function computeLayout(){
  const LX={2:20, 3:20+CARD_W+GAP_X, 4:20+2*(CARD_W+GAP_X)};
  let globalY=20;
  tables.filter(t=>t.level===2).forEach(t2=>{
    let currentY=globalY;
    t2.children.forEach(t3id=>{
      const t3=getTable(t3id);if(!t3)return;
      let childH=0;
      t3.children.forEach((cid,i)=>{
        if(i>0)childH+=GAP_Y;
        childH+=cardH(getTable(cid));
      });
      const span=Math.max(childH,cardH(t3));
      let cy=currentY+(span-childH)/2;
      t3.children.forEach(cid=>{
        const ct=getTable(cid);if(!ct)return;
        positions[cid]={x:LX[4],y:cy};
        cy+=cardH(ct)+GAP_Y;
      });
      positions[t3id]={x:LX[3],y:currentY+(span-cardH(t3))/2};
      currentY+=span+GAP_Y;
    });
    const totalSpan=currentY-globalY-GAP_Y;
    positions[t2.id]={x:LX[2],y:globalY+Math.max(0,(totalSpan-cardH(t2))/2)};
    globalY=currentY+GAP_Y*2;
  });
  let maxX=0,maxY=0;
  tables.forEach(t=>{
    const p=positions[t.id];if(!p)return;
    maxX=Math.max(maxX,p.x+CARD_W+40);
    maxY=Math.max(maxY,p.y+cardH(t)+40);
  });
  document.getElementById('board').style.width=maxX+'px';
  document.getElementById('board').style.height=maxY+'px';
  document.getElementById('lines').setAttribute('width',maxX);
  document.getElementById('lines').setAttribute('height',maxY);
}

function renderAll(){
  computeLayout();
  renderCards();
  renderLines();
}

function renderCards(){
  const board=document.getElementById('board');
  board.querySelectorAll('.tbl-card').forEach(e=>e.remove());
  tables.forEach(t=>{
    const p=positions[t.id];if(!p)return;
    const el=document.createElement('div');
    el.className=`tbl-card l${t.level}`;
    el.id='card-'+t.id;
    el.style.cssText=`left:${p.x}px;top:${p.y}px`;
    const isCollapsed = collapsedTables[t.id] || false;
    el.innerHTML=`
      <div class="tbl-head" id="head-${t.id}" ondblclick="openTableEdit('${t.id}',event)">
        <div class="tbl-head-row">
          <span class="tbl-badge b-l${t.level}">L${t.level}</span>
          <button class="tbl-toggle${isCollapsed?' collapsed':''}" onclick="toggleCollapse('${t.id}',event)" title="컬럼 접기/펼치기"><i class="ti ti-chevron-down"></i></button>
        </div>
        <div class="tbl-name">${escHtml(t.name)}</div>
        ${t.desc?`<div class="tbl-desc">${escHtml(t.desc)}</div>`:''}
      </div>
      <div class="col-rows${isCollapsed?' collapsed':''}">
        ${t.cols.map(col=>{
          const hasF=!!(col.formula&&col.formula.trim());
          return `<div class="col-row${hasF?' has-formula':''}" ondblclick="openColEdit('${t.id}','${col.id}',event)">
            <span class="col-dot ${hasF?'dot-calc':'dot-raw'}"></span>
            <div class="col-top">
              <span class="col-name">${escHtml(col.name)}</span>
              <span class="col-type">${escHtml(col.type)}</span>
              ${hasF?'<span class="formula-icon">f</span>':''}
            </div>
            ${hasF?`<div class="col-formula" onclick="inlineEditFormula(event,'${t.id}','${col.id}')" title="클릭하여 수정">= ${escHtml(col.formula)}</div>`:''}
          </div>`;
        }).join('')}
        <button class="add-col-btn" onclick="quickAddCol('${t.id}')">+ 컬럼 추가</button>
      </div>
      <div class="col-count">${t.cols.length}개 컬럼</div>`;
    makeDraggable(el, t.id);
    board.appendChild(el);
  });
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function makeDraggable(el, tid){
  const handle=el.querySelector('.tbl-head');
  let ox,oy,sx,sy,dragging=false;
  handle.addEventListener('mousedown',e=>{
    if(e.target.tagName==='BUTTON'||e.detail>1||spaceHeld)return;
    dragging=true; cardDragging=true;
    ox=positions[tid].x; oy=positions[tid].y; sx=e.clientX; sy=e.clientY;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const dx=(e.clientX-sx)/zoomLevel, dy=(e.clientY-sy)/zoomLevel;
    positions[tid]={x:Math.round(ox+dx),y:Math.round(oy+dy)};
    el.style.left=positions[tid].x+'px'; el.style.top=positions[tid].y+'px';
    renderLines();
  });
  document.addEventListener('mouseup',()=>{if(dragging){dragging=false; cardDragging=false;}});
}

function renderLines(){
  const svg=document.getElementById('lines');
  if(!showLines){svg.innerHTML='';return;}
  let d=`<defs><marker id="ra" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;
  tables.forEach(t=>{
    if(t.parent){
      const pt=getTable(t.parent);
      const pp=positions[pt.id],tp=positions[t.id];
      if(pp&&tp){
        const ph=cardH(pt), th=cardH(t);
        const x1=pp.x+CARD_W, y1=pp.y+ph/2, x2=tp.x, y2=tp.y+th/2, mx=(x1+x2)/2;
        d+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" fill="none" stroke="var(--color-border-secondary)" stroke-width="1" opacity="0.7"/>`;
      }
    }
    const srcCollapsed = collapsedTables[t.id];
    const refsByTarget = {};
    t.cols.forEach(col=>{
      (col.refs||[]).forEach(ref=>{
        const key = ref.tableId;
        if(!refsByTarget[key]) refsByTarget[key]=[];
        refsByTarget[key].push({col, ref});
      });
    });
    Object.keys(refsByTarget).forEach(tgtId=>{
      const refs = refsByTarget[tgtId];
      const tgt = getTable(tgtId);
      const sp = positions[t.id], tp = positions[tgt.id];
      if(!sp||!tp) return;
      const tgtCollapsed = collapsedTables[tgtId];
      const totalRefs = refs.length;
      const srcH = cardH(t), tgtH = cardH(tgt);
      refs.forEach((r, idx)=>{
        const si = t.cols.findIndex(c=>c.id===r.col.id);
        const ti = tgt.cols.findIndex(c=>c.id===r.ref.colId);
        if(si<0||ti<0) return;
        let x1, y1, x2, y2;
        if(srcCollapsed){
          const spread = Math.min(srcH-20, totalRefs*4);
          const offset = totalRefs>1 ? -spread/2 + (idx/(totalRefs-1))*spread : 0;
          x1 = sp.x+CARD_W; y1 = sp.y+srcH/2+offset;
        } else {
          const sy = t.cols.slice(0,si).reduce((s,c)=>s+COL_H(c),0);
          x1 = sp.x+CARD_W; y1 = sp.y+HEAD_H+sy+COL_H(t.cols[si])/2;
        }
        if(tgtCollapsed){
          const spread = Math.min(tgtH-20, totalRefs*4);
          const offset = totalRefs>1 ? -spread/2 + (idx/(totalRefs-1))*spread : 0;
          x2 = tp.x; y2 = tp.y+tgtH/2+offset;
        } else {
          const ty = tgt.cols.slice(0,ti).reduce((s,c)=>s+COL_H(c),0);
          x2 = tp.x; y2 = tp.y+HEAD_H+ty+COL_H(tgt.cols[ti])/2;
        }
        const cx1=x1+Math.abs(x2-x1)*0.4, cx2=x2-Math.abs(x2-x1)*0.4;
        d+=`<path d="M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-opacity="${srcCollapsed||tgtCollapsed?'0.3':'0.5'}" stroke-dasharray="5 3" marker-end="url(#ra)"/>`;
      });
    });
  });
  svg.innerHTML=d;
}

  showLines=!showLines;

function buildRefsHtml(refs){
  if(!refs.length)return `<span style="font-size:10px;color:var(--color-text-tertiary)">없음</span>`;
  return refs.map((r,i)=>{
    const t=getTable(r.tableId),c=t?getCol(r.tableId,r.colId):null;
    return `<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">

      <button onclick="epRemoveRef(${i})" style="background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:12px;padding:0 2px">×</button>
    </div>`;
  }).join('');
}

function epAddRef(){
  const t=document.getElementById('ep-reftbl').value,c=document.getElementById('ep-refcol').value;
  if(!t||!c)return;
  if(!window._epRefs.some(r=>r.tableId===t&&r.colId===c))window._epRefs.push({tableId:t,colId:c});
  document.getElementById('ep-refs-list').innerHTML=buildRefsHtml(window._epRefs);
}
function epRemoveRef(i){window._epRefs.splice(i,1);document.getElementById('ep-refs-list').innerHTML=buildRefsHtml(window._epRefs);}

  function rd(id){
    const n=getTable(id);if(!n)return;
    n.children.forEach(rd);
    tables=tables.filter(x=>x.id!==id);
    tables.forEach(x=>{x.children=x.children.filter(c=>c!==id);x.cols.forEach(c=>{if(c.refs)c.refs=c.refs.filter(r=>r.tableId!==id)})});
  }
  rd(tid);closeEditPanel();renderAll();
}

/* ── Inline formula edit ── */
function inlineEditFormula(e, tid, cid){
  e.stopPropagation();
  const col = getCol(tid, cid);
  if(!col) return;
  const target = e.currentTarget;
  const oldFormula = col.formula || '';
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'col-formula-edit';
  input.value = oldFormula;
  input.placeholder = '연산식 입력 (예: revenue - cost)';
  target.replaceWith(input);
  input.focus();
  input.select();

  function save(){
    const newFormula = input.value.trim();
    col.formula = newFormula;
    renderAll();
  }
  input.addEventListener('keydown', function(ev){
    if(ev.key === 'Enter'){ ev.preventDefault(); save(); }
    if(ev.key === 'Escape'){ ev.preventDefault(); renderAll(); }
  });
  input.addEventListener('blur', save);
}

function quickAddCol(tid){
  const name=prompt('컬럼명:','new_col');if(!name)return;
  getTable(tid).cols.push({id:'c'+(++idC),name,type:'DEC',formula:'',refs:[]});
  renderAll();
}

  ov.innerHTML=`<div class="modal-card">
    <h3>테이블 추가</h3>
    <div class="modal-field"><label>테이블명</label><input id="mt-name" placeholder="4_new_table" autofocus></div>
    <div class="modal-field"><label>설명</label><textarea id="mt-desc" placeholder="테이블 설명"></textarea></div>
    <div class="modal-field"><label>상위 테이블</label>
      <select id="mt-parent">
        <option value="">없음 (최상위 L2)</option>
        ${tables.map(t=>`<option value="${t.id}">${'　'.repeat(t.level-2)}${escHtml(t.name)}</option>`).join('')}
      </select>
    </div>
    <div class="modal-btns">
      <button onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveNewTable()">추가</button>
    </div>
  </div>`;
  ov.style.display='flex';
  setTimeout(()=>document.getElementById('mt-name')&&document.getElementById('mt-name').focus(),50);
}

function saveNewTable(){
  const name=document.getElementById('mt-name').value.trim();
  if(!name){alert('테이블명을 입력하세요');return;}
  const parentId=document.getElementById('mt-parent').value||null;
  const parent=parentId?getTable(parentId):null;
  const level=parent?Math.min(parent.level+1,4):2;
  const nt={id:'t'+(++idC),level,name,desc:document.getElementById('mt-desc').value.trim(),parent:parentId,children:[],cols:[]};
  tables.push(nt);
  if(parent)parent.children.push(nt.id);
  closeModal();renderAll();
}

function closeModal(){document.getElementById('modal-overlay').style.display='none';}

document.addEventListener('click',e=>{
  const panel=document.getElementById('edit-panel');
  if(panel.style.display!=='none'&&!panel.contains(e.target)&&!e.target.closest('.tbl-card'))closeEditPanel();
  const ov=document.getElementById('modal-overlay');
  if(e.target===ov)closeModal();
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeEditPanel();closeModal();}
});

/* ── localStorage 자동저장 / JSON 내보내기·불러오기 ── */
const STORAGE_KEY = 'pnl_metric_tree_data_v5';

function getState(){
  return {tables, positions, idCounter: idC, collapsedTables};
}

function loadState(state){
  if(!state||!Array.isArray(state.tables))return false;
  tables = state.tables;
  positions = state.positions||{};
  idC = state.idCounter||300;
  collapsedTables = state.collapsedTables||{};
  return true;
}

function autoSave(){
  try{localStorage.setItem(STORAGE_KEY, JSON.stringify(getState()));}catch(e){}
}

function autoLoad(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return loadState(JSON.parse(raw));
  }catch(e){}
  return false;
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(getState(), null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pnl_data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJSON(e){
  const file = e.target.files[0];
  if(!file)return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const state = JSON.parse(ev.target.result);
      if(loadState(state)){
        autoSave();
        renderAll();
      } else {
        alert('올바른 PNL 데이터 파일이 아닙니다.');
      }
    }catch(err){alert('JSON 파싱 오류: '+err.message);}
  };
  reader.readAsText(file);
  e.target.value='';
}

// 기존 renderAll을 래핑하여 변경 시 자동저장
const _origRenderAll = renderAll;
renderAll = function(){
  _origRenderAll();
  autoSave();
};

// 시작 시 localStorage에서 복원 시도
if(autoLoad()){
  renderAll();
} else {
  renderAll();
}
setTimeout(fitToView, 50);
</script>
